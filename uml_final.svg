<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2937; }
      .cls-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .txt { font: 14px Arial, sans-serif; fill: #111827; }
      .line { stroke: #374151; stroke-width: 2; fill: none; }
      .box { fill: #f9fafb; stroke: #374151; stroke-width: 2; rx: 8; }
      .sep { stroke: #9ca3af; stroke-width: 1.5; }
      .lbl { font: 13px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151" />
    </marker>
  </defs>

  <text x="40" y="45" class="title">PawPal+ Final UML Diagram</text>

  <rect x="40" y="80" width="420" height="360" class="box"/>
  <line x1="40" y1="118" x2="460" y2="118" class="sep"/>
  <line x1="40" y1="230" x2="460" y2="230" class="sep"/>
  <text x="60" y="105" class="cls-title">Owner</text>
  <text x="60" y="145" class="txt">+ owner_id: str</text>
  <text x="60" y="168" class="txt">+ name: str</text>
  <text x="60" y="191" class="txt">+ available_minutes_per_day: int</text>
  <text x="60" y="214" class="txt">+ preferences: dict, pet_ids: list, pets: dict</text>
  <text x="60" y="258" class="txt">+ update_preferences(preferences)</text>
  <text x="60" y="281" class="txt">+ set_daily_availability(minutes)</text>
  <text x="60" y="304" class="txt">+ add_pet(pet)</text>
  <text x="60" y="327" class="txt">+ get_pet(pet_id) -&gt; Pet</text>
  <text x="60" y="350" class="txt">+ add_task_to_pet(pet_id, task)</text>
  <text x="60" y="373" class="txt">+ get_all_tasks(include_completed) -&gt; list[Task]</text>

  <rect x="560" y="80" width="420" height="315" class="box"/>
  <line x1="560" y1="118" x2="980" y2="118" class="sep"/>
  <line x1="560" y1="230" x2="980" y2="230" class="sep"/>
  <text x="580" y="105" class="cls-title">Pet</text>
  <text x="580" y="145" class="txt">+ pet_id: str</text>
  <text x="580" y="168" class="txt">+ owner_id: str</text>
  <text x="580" y="191" class="txt">+ name/species/age_years</text>
  <text x="580" y="214" class="txt">+ care_notes: list, tasks: list[Task]</text>
  <text x="580" y="258" class="txt">+ add_care_note(note)</text>
  <text x="580" y="281" class="txt">+ get_profile_summary() -&gt; str</text>
  <text x="580" y="304" class="txt">+ add_task(task)</text>
  <text x="580" y="327" class="txt">+ get_tasks(include_completed) -&gt; list[Task]</text>

  <rect x="1080" y="80" width="480" height="385" class="box"/>
  <line x1="1080" y1="118" x2="1560" y2="118" class="sep"/>
  <line x1="1080" y1="285" x2="1560" y2="285" class="sep"/>
  <text x="1100" y="105" class="cls-title">Task</text>
  <text x="1100" y="145" class="txt">+ task_id: str, pet_id: str</text>
  <text x="1100" y="168" class="txt">+ description: str, category: str</text>
  <text x="1100" y="191" class="txt">+ duration_minutes: int, priority: str</text>
  <text x="1100" y="214" class="txt">+ frequency: str, due_time: time</text>
  <text x="1100" y="237" class="txt">+ time_window: tuple[time,time]</text>
  <text x="1100" y="260" class="txt">+ is_mandatory: bool, completed: bool</text>
  <text x="1100" y="313" class="txt">+ mark_completed()</text>
  <text x="1100" y="336" class="txt">+ mark_incomplete()</text>
  <text x="1100" y="359" class="txt">+ is_feasible(available_minutes) -&gt; bool</text>
  <text x="1100" y="382" class="txt">+ priority_score() -&gt; int</text>

  <rect x="300" y="510" width="700" height="455" class="box"/>
  <line x1="300" y1="548" x2="1000" y2="548" class="sep"/>
  <line x1="300" y1="615" x2="1000" y2="615" class="sep"/>
  <text x="320" y="535" class="cls-title">Scheduler</text>
  <text x="320" y="575" class="txt">+ owner: Owner</text>
  <text x="320" y="598" class="txt">+ tasks: list[Task]</text>
  <text x="320" y="643" class="txt">+ add_task(task)</text>
  <text x="320" y="666" class="txt">+ retrieve_tasks_from_owner(include_completed)</text>
  <text x="320" y="689" class="txt">+ sort_by_time(tasks)</text>
  <text x="320" y="712" class="txt">+ filter_tasks(tasks, completed, pet_name)</text>
  <text x="320" y="735" class="txt">+ detect_time_conflicts(tasks)</text>
  <text x="320" y="758" class="txt">+ complete_task(task_id)</text>
  <text x="320" y="781" class="txt">+ rank_tasks()</text>
  <text x="320" y="804" class="txt">+ build_daily_plan()</text>
  <text x="320" y="827" class="txt">+ explain_plan(plan)</text>

  <rect x="1080" y="620" width="260" height="130" class="box"/>
  <line x1="1080" y1="658" x2="1340" y2="658" class="sep"/>
  <text x="1100" y="645" class="cls-title">DailyScheduler</text>
  <text x="1100" y="688" class="txt">Compatibility alias</text>
  <text x="1100" y="711" class="txt">inherits Scheduler</text>

  <path d="M460 210 L560 210" class="line" marker-end="url(#arrow)"/>
  <text x="480" y="198" class="lbl">owns 1 to 0..*</text>

  <path d="M980 210 L1080 210" class="line" marker-end="url(#arrow)"/>
  <text x="1000" y="198" class="lbl">has 1 to 0..*</text>

  <path d="M500 510 L420 440" class="line" marker-end="url(#arrow)"/>
  <text x="430" y="488" class="lbl">uses Owner</text>

  <path d="M870 510 L1220 465" class="line" marker-end="url(#arrow)"/>
  <text x="930" y="500" class="lbl">manages Task list</text>

  <path d="M1080 685 L1000 685" class="line" marker-end="url(#arrow)"/>
  <text x="1015" y="672" class="lbl">inherits</text>
</svg>
